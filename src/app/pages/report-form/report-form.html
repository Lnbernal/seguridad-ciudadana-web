<!-- src/app/pages/report-form/report-form.html -->

<div class="dashboard-page">
  <div class="dashboard-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div>
          <h2>Seguridad Ciudadana</h2>
          <p>Sistema de Reportes</p>
        </div>
      </div>

      <nav class="menu">
        <a routerLink="/dashboard" class="menu-item">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a routerLink="/nuevo-reporte" class="menu-item active">
          <i class="fas fa-plus-circle"></i>
          <span>Nuevo Reporte</span>
        </a>

        <a routerLink="/reportes" class="menu-item">
          <i class="fas fa-folder-open"></i>
          <span>Mis Reportes</span>
        </a>

        <button type="button" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Cerrar Sesión</span>
        </button>
      </nav>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <!-- ENCABEZADO -->
      <header class="topbar fade-in">
        <div>
          <h1>Nuevo Reporte</h1>
          <p>
            Registra un incidente y selecciona la ubicación exacta en el mapa.
          </p>
        </div>
      </header>

      <!-- FORMULARIO -->
      <section class="dashboard-panel fade-in">
        <form (ngSubmit)="submit()" class="report-form">
          <!-- TÍTULO -->
          <div class="form-group">
            <label>Título</label>
            <input
              type="text"
              name="titulo"
              [(ngModel)]="form.titulo"
              required
            />
          </div>

          <!-- DESCRIPCIÓN -->
          <div class="form-group">
            <label>Descripción</label>
            <textarea
              name="descripcion"
              rows="4"
              [(ngModel)]="form.descripcion"
              required
            ></textarea>
          </div>

          <!-- CATEGORÍA Y MUNICIPIO -->
          <div class="form-grid two-columns">
            <div class="form-group">
              <label>Categoría</label>
              <select
                name="id_categoria"
                [(ngModel)]="form.id_categoria"
                required
              >
                <option value="">Seleccione una categoría</option>
                <option
                  *ngFor="let categoria of categorias"
                  [value]="categoria.id_categoria"
                >
                  {{ categoria.nombre_categoria }}
                </option>
              </select>
            </div>

            <div class="form-group">
              <label>Municipio</label>
              <select
                name="id_municipio"
                [(ngModel)]="form.id_municipio"
                required
              >
                <option value="">Seleccione un municipio</option>
                <option
                  *ngFor="let municipio of municipios"
                  [value]="municipio.id_municipio"
                >
                  {{ municipio.nombre }}
                </option>
              </select>
            </div>
          </div>

          <!-- DIRECCIÓN -->
          <div class="form-group">
            <label>Dirección</label>
            <input
              type="text"
              name="direccion"
              [(ngModel)]="form.direccion"
            />
          </div>

          <!-- PRIORIDAD Y ANÓNIMO -->
          <div class="form-grid two-columns">
            <div class="form-group">
              <label>Prioridad</label>
              <select
                name="prioridad"
                [(ngModel)]="form.prioridad"
              >
                <option value="BAJA">Baja</option>
                <option value="MEDIA">Media</option>
                <option value="ALTA">Alta</option>
              </select>
            </div>

            <div class="form-group checkbox-group">
              <label class="checkbox-label">
                <input
                  type="checkbox"
                  name="anonimo"
                  [(ngModel)]="form.anonimo"
                />
                <span>Reportar de forma anónima</span>
              </label>
            </div>
          </div>

          <!-- MAPA -->
          <div class="form-group">
            <label>Ubicación del incidente</label>
            <div id="map" class="map-container"></div>

            <div class="coordinates">
              <div>
                <strong>Latitud:</strong>
                {{ form.latitud }}
              </div>
              <div>
                <strong>Longitud:</strong>
                {{ form.longitud }}
              </div>
            </div>
          </div>

          <!-- EVIDENCIA -->
          <div class="form-group">
            <label>Evidencia (imagen o video)</label>
            <input
              type="file"
              name="evidencia"
              accept="image/*,video/*"
              (change)="onFileSelected($event)"
            />
            <p class="help-text">
              Adjunta imágenes o videos relacionados con el incidente.
            </p>
          </div>

          <!-- BOTÓN -->
          <button
            type="submit"
            [disabled]="loading"
            class="submit-btn"
          >
            {{ loading ? 'Guardando...' : 'Crear Reporte' }}
          </button>
        </form>
      </section>
    </main>
  </div>
</div>
