<!-- src/app/pages/report-form/report-form.html -->

<div class="p-8 max-w-3xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">
    Crear Reporte Ciudadano
  </h1>

  <form
    (ngSubmit)="submit()"
    class="space-y-4"
  >
    <!-- TÍTULO -->
    <div>
      <label class="block font-semibold mb-1">
        Título
      </label>
      <input
        type="text"
        name="titulo"
        [(ngModel)]="form.titulo"
        required
        class="w-full border rounded px-3 py-2"
      />
    </div>

    <!-- DESCRIPCIÓN -->
    <div>
      <label class="block font-semibold mb-1">
        Descripción
      </label>
      <textarea
        name="descripcion"
        [(ngModel)]="form.descripcion"
        required
        rows="4"
        class="w-full border rounded px-3 py-2"
      ></textarea>
    </div>

    <!-- CATEGORÍA -->
    <div>
      <label class="block font-semibold mb-1">
        Categoría
      </label>
      <select
        name="id_categoria"
        [(ngModel)]="form.id_categoria"
        required
        class="w-full border rounded px-3 py-2"
      >
        <option value="">
          Seleccione una categoría
        </option>

        <option
          *ngFor="let categoria of categorias"
          [value]="categoria.id_categoria"
        >
          {{ categoria.nombre_categoria }}
        </option>
      </select>
    </div>

    <!-- MUNICIPIO -->
    <div>
      <label class="block font-semibold mb-1">
        Municipio
      </label>
      <select
        name="id_municipio"
        [(ngModel)]="form.id_municipio"
        required
        class="w-full border rounded px-3 py-2"
      >
        <option value="">
          Seleccione un municipio
        </option>

        <option
          *ngFor="let municipio of municipios"
          [value]="municipio.id_municipio"
        >
          {{ municipio.nombre }}
        </option>
      </select>
    </div>

    <!-- DIRECCIÓN -->
    <div>
      <label class="block font-semibold mb-1">
        Dirección
      </label>
      <input
        type="text"
        name="direccion"
        [(ngModel)]="form.direccion"
        class="w-full border rounded px-3 py-2"
      />
    </div>

    <!-- PRIORIDAD -->
    <div>
      <label class="block font-semibold mb-1">
        Prioridad
      </label>
      <select
        name="prioridad"
        [(ngModel)]="form.prioridad"
        class="w-full border rounded px-3 py-2"
      >
        <option value="BAJA">Baja</option>
        <option value="MEDIA">Media</option>
        <option value="ALTA">Alta</option>
      </select>
    </div>

    <!-- ANÓNIMO -->
    <div class="flex items-center gap-2">
      <input
        type="checkbox"
        name="anonimo"
        [(ngModel)]="form.anonimo"
      />
      <label>
        Reportar de forma anónima
      </label>
    </div>

    <!-- UBICACIÓN (OPCIONAL) -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block font-semibold mb-1">
          Latitud (opcional)
        </label>
        <input
          type="number"
          name="latitud"
          [(ngModel)]="form.latitud"
          step="any"
          class="w-full border rounded px-3 py-2"
        />
      </div>

      <div>
        <label class="block font-semibold mb-1">
          Longitud (opcional)
        </label>
        <input
          type="number"
          name="longitud"
          [(ngModel)]="form.longitud"
          step="any"
          class="w-full border rounded px-3 py-2"
        />
      </div>
    </div>

    <!-- EVIDENCIA -->
    <div>
      <label class="block font-semibold mb-1">
        Evidencia (imagen o video)
      </label>

      <input
        type="file"
        name="evidencia"
        accept="image/*,video/*"
        (change)="onFileSelected($event)"
        class="w-full border rounded px-3 py-2"
      />

      <p class="text-sm text-gray-500 mt-1">
        Puedes adjuntar una imagen o video como evidencia del reporte.
      </p>
    </div>

    <!-- BOTÓN -->
    <button
      type="submit"
      [disabled]="loading"
      class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700"
    >
      {{ loading ? 'Guardando...' : 'Crear Reporte' }}
    </button>
  </form>
</div>
