<!-- src/app/pages/dashboard/dashboard.html -->

<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-6xl mx-auto">
    <!-- ENCABEZADO -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <h1 class="text-3xl font-bold text-gray-800">
        Panel de Control
      </h1>
      <p class="text-gray-600 mt-2">
        Bienvenido al sistema de Seguridad Ciudadana
      </p>
    </div>

    <!-- BOTONES DE ACCIÓN -->
    <div class="grid md:grid-cols-3 gap-6">
      <!-- NUEVO REPORTE -->
      <a
        routerLink="/reportes/nuevo"
        class="block bg-blue-600 hover:bg-blue-700 text-white rounded-xl shadow p-6 text-center transition"
      >
        <h2 class="text-xl font-bold mb-2">
          Nuevo Reporte
        </h2>
        <p class="text-sm opacity-90">
          Registrar un nuevo incidente ciudadano
        </p>
      </a>

      <!-- VER REPORTES -->
      <a
        routerLink="/reportes"
        class="block bg-green-600 hover:bg-green-700 text-white rounded-xl shadow p-6 text-center transition"
      >
        <h2 class="text-xl font-bold mb-2">
          Ver Reportes
        </h2>
        <p class="text-sm opacity-90">
          Consultar todos los reportes registrados
        </p>
      </a>

      <!-- CERRAR SESIÓN -->
      <button
        type="button"
        (click)="logout()"
        class="bg-red-600 hover:bg-red-700 text-white rounded-xl shadow p-6 text-center transition"
      >
        <h2 class="text-xl font-bold mb-2">
          Cerrar Sesión
        </h2>
        <p class="text-sm opacity-90">
          Salir del sistema
        </p>
      </button>
    </div>
  </div>
</div>
