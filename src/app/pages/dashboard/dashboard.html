<div class="min-h-screen bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-blue-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">
        Seguridad Ciudadana
      </h1>

      <button
        (click)="logout()"
        class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg"
      >
        Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="max-w-7xl mx-auto p-6">

    <h2 class="text-3xl font-bold mb-6">
      Panel Principal
    </h2>

    <!-- Tarjetas -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-gray-500">Total Reportes</h3>
        <p class="text-4xl font-bold text-blue-600 mt-2">0</p>
      </div>

      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-gray-500">En Proceso</h3>
        <p class="text-4xl font-bold text-yellow-500 mt-2">0</p>
      </div>

      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="text-gray-500">Resueltos</h3>
        <p class="text-4xl font-bold text-green-600 mt-2">0</p>
      </div>

    </div>

    <!-- Acciones rápidas -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <a
        routerLink="/nuevo-reporte"
        class="bg-blue-600 text-white p-6 rounded-xl shadow hover:bg-blue-700 text-center text-xl font-semibold"
      >
        Crear Nuevo Reporte
      </a>

      <a
        routerLink="/reportes"
        class="bg-green-600 text-white p-6 rounded-xl shadow hover:bg-green-700 text-center text-xl font-semibold"
      >
        Ver Mis Reportes
      </a>

    </div>

  </div>

</div>
